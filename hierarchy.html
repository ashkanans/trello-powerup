<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    body {
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .search-wrap {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-wrap .search-input {
      width: 100%;
      max-width: 480px;
    }
    .export-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-subtle);
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .export-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    #app {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 8px 32px 24px;
    }
    .tree-root {
      width: max-content;
      min-width: 360px;
      max-height: none;
      overflow: visible;
      padding: 0;
    }
  </style>
  <script src="./config.js"></script>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<div class="search-wrap">
  <input class="search-input" id="search" type="text" placeholder="Search cards…">
  <button class="export-btn" id="exportBtn" title="Export this list's hierarchy as a .txt outline">Export Tree</button>
  <button class="export-btn" id="exportDueBtn" title="Export the cards shown in this hierarchy, grouped by due date, then by list">Export by Due Date</button>
</div>
<div id="app"><p class="loading" style="padding:12px">Loading…</p></div>

<script>
try {
  var _ctx = JSON.parse(decodeURIComponent(window.location.hash.slice(1)));
  if (_ctx.context && _ctx.context.initialTheme === 'dark') {
    document.documentElement.classList.add('dark');
  }
} catch(e) {}

var t = TrelloPowerUp.iframe({ appKey: TRELLO_APP_KEY });
var listId   = t.arg('listId');
var listName = t.arg('listName') || '';

var DONE_PAT = /✅|done|completato|fatto|complete/i;

var _state = {
  allCards:    [],
  relations:   {},
  priorities:  {},
  completions: {},
  lists:       [],
  cardMap:     {},
  listNameMap: {},
  doneListIds: new Set(),
  collapsed:   new Set()
};

document.getElementById('search').placeholder = listName
  ? 'Search in ' + listName + '…'
  : 'Search cards…';

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ────────────────────────────────────────

window._openCard = function(shortLink) {
  // Fire both immediately, uncoupled from each other — closeModal() tears
  // down this iframe, so anything chained onto its .then() (as this used to
  // be) can silently never run once the frame is gone. t.showCard() is also
  // Trello's recommended call for opening a non-archived card on this board
  // (faster than t.navigate(), which is meant for archived/off-board URLs).
  t.showCard(shortLink).catch(function() {});
  t.closeModal().catch(function() {});
};

window._toggleCollapse = function(cardId) {
  _state.collapsed.has(cardId) ? _state.collapsed.delete(cardId) : _state.collapsed.add(cardId);
  renderTree();
};

window._cyclePriority = function(cardId) {
  var cur  = _state.priorities[cardId] || 0;
  var next = cur >= 3 ? 0 : cur + 1;
  if (next === 0) delete _state.priorities[cardId];
  else _state.priorities[cardId] = next;
  t.set('board', 'shared', 'priorities', _state.priorities).then(renderTree);
};

// ── Helpers ────────────────────────────────────────

function isDone(card) {
  return !!_state.completions[card.id] || _state.doneListIds.has(card.idList);
}

function directChildren(cardId) {
  return Object.keys(_state.relations)
    .filter(function(id) { return _state.relations[id] === cardId; })
    .map(function(id) { return _state.cardMap[id]; })
    .filter(Boolean)
    .sort(function(a, b) {
      var pa = _state.priorities[a.id] || 999;
      var pb = _state.priorities[b.id] || 999;
      return pa !== pb ? pa - pb : a.idShort - b.idShort;
    });
}

function anyDescendantMatches(cardId, q) {
  return directChildren(cardId).some(function(c) {
    return c.name.toLowerCase().includes(q) || anyDescendantMatches(c.id, q);
  });
}

function dueBadge(due, dueComplete) {
  if (!due) return '';
  var d    = new Date(due);
  var diff = d - Date.now();
  var cls  = dueComplete          ? 'due-badge done'
           : diff < 0             ? 'due-badge overdue'
           : diff < 604800000     ? 'due-badge soon'
           :                        'due-badge';
  var label = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  return '<span class="' + cls + '">' + label + '</span>';
}

function avatarHtml(members) {
  if (!members || !members.length) return '';
  var html = '<span class="avatar-group">';
  members.slice(0, 3).forEach(function(m) {
    var initials = (m.fullName || m.username || '?')
      .split(' ').map(function(n) { return n[0] || ''; }).join('').slice(0, 2).toUpperCase();
    if (m.avatarHash) {
      html += '<img class="avatar" src="https://trello-avatars.s3.amazonaws.com/' + m.avatarHash + '/30.png"'
        + ' title="' + escHtml(m.fullName || m.username) + '"'
        + ' onerror="this.style.display=\'none\'">';
    } else {
      html += '<span class="avatar avatar-init" title="' + escHtml(m.fullName || m.username) + '">' + escHtml(initials) + '</span>';
    }
  });
  html += '</span>';
  return html;
}

// ── Render ─────────────────────────────────────────

function renderSubtree(card, isChild, q) {
  if (q) {
    var selfMatch = card.name.toLowerCase().includes(q);
    if (!selfMatch && !anyDescendantMatches(card.id, q)) return '';
  }

  var children  = directChildren(card.id);
  var hasKids   = children.length > 0;
  var collapsed = _state.collapsed.has(card.id);
  var done      = children.filter(function(c) { return isDone(c); }).length;
  var p         = _state.priorities[card.id] || 0;
  var pLabels   = ['—','P1','P2','P3'];

  var html = '<div class="tree-node">';
  html += '<div class="tree-card' + (isChild ? ' is-child' : '') + '">';

  // Collapse toggle
  if (hasKids) {
    html += '<button class="collapse-btn" onclick="event.stopPropagation();window._toggleCollapse(\'' + card.id + '\')">'
      + (collapsed ? '▶' : '▼') + '</button>';
  } else {
    html += '<span class="collapse-placeholder"></span>';
  }

  // Status dot
  html += '<span class="status-dot ' + (isDone(card) ? 'done' : 'todo') + '"></span>';

  // Title — clicking opens card and closes modal
  if (card.shortLink) {
    html += '<span class="card-title is-link" onclick="window._openCard(\'' + card.shortLink + '\')">' + escHtml(card.name) + '</span>';
  } else {
    html += '<span class="card-title">' + escHtml(card.name) + '</span>';
  }

  // Progress pill (parents only)
  if (hasKids) {
    var pct = Math.round(done / children.length * 100);
    var pillCls = pct === 100 ? 'progress-pill complete' : pct === 0 ? 'progress-pill zero' : 'progress-pill';
    html += '<span class="' + pillCls + '">' + done + '/' + children.length + '</span>';
  }

  // Due date
  html += dueBadge(card.due, card.dueComplete);

  // Assignee avatars
  html += avatarHtml(card.members);

  // Priority badge (click to cycle none→P1→P2→P3→none)
  html += '<button class="priority-badge p' + p + '" onclick="event.stopPropagation();window._cyclePriority(\'' + card.id + '\')" title="Priority (click to cycle)">'
    + pLabels[p] + '</button>';

  // Cross-list badge
  if (card.idList !== listId) {
    html += '<span class="tree-list-badge">' + escHtml(_state.listNameMap[card.idList] || '?') + '</span>';
  }

  // Open-card chevron
  if (card.shortLink) {
    html += '<svg class="card-arrow" viewBox="0 0 16 16" fill="none">'
      + '<path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      + '</svg>';
  }

  html += '</div>';

  if (hasKids && !collapsed) {
    html += '<div class="tree-children">';
    children.forEach(function(c) { html += renderSubtree(c, true, q); });
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// Root cards for the current list: in-list cards whose parent (if any)
// isn't also in this list. Shared by renderTree() and exportHierarchy().
function listRoots() {
  var listCards  = _state.allCards.filter(function(c) { return c.idList === listId; });
  var listCardIds = new Set(listCards.map(function(c) { return c.id; }));

  var childrenInList = new Set();
  listCards.forEach(function(c) {
    var pid = _state.relations[c.id];
    if (pid && listCardIds.has(pid)) childrenInList.add(c.id);
  });

  return listCards.filter(function(c) { return !childrenInList.has(c.id); });
}

function renderTree() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var roots = listRoots();

  var content = '';
  roots.forEach(function(c) { content += renderSubtree(c, false, q); });

  document.getElementById('app').innerHTML = '<div class="tree-root">'
    + (content || '<p class="empty-hint" style="padding:12px 0">'
        + (q ? 'No cards match your search.' : 'No cards in this list.') + '</p>')
    + '</div>';
}

// ── Export ─────────────────────────────────────────

// Checkbox-outline lines for a card and its full subtree (ignores collapse
// state and the search filter — export always covers everything).
function exportLines(card, depth) {
  var children = directChildren(card.id);
  var indent   = '  '.repeat(depth);
  var box      = isDone(card) ? '[x]' : '[ ]';
  var pct      = '';
  if (children.length > 0) {
    var done = children.filter(function(c) { return isDone(c); }).length;
    pct = ' (' + Math.round(done / children.length * 100) + '%)';
  }
  var lines = [indent + '- ' + box + ' ' + card.name + pct];
  children.forEach(function(c) { lines = lines.concat(exportLines(c, depth + 1)); });
  return lines;
}

function downloadText(text, filename) {
  var blob = new Blob([text], { type: 'text/plain' });
  var url  = URL.createObjectURL(blob);

  var a = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportHierarchy() {
  var lines = [];
  listRoots().forEach(function(c) { lines = lines.concat(exportLines(c, 0)); });

  var text = (listName || 'Hierarchy') + '\n\n' + lines.join('\n') + '\n';
  var safeName = (listName || 'hierarchy').replace(/[^a-z0-9\-_ ]/gi, '').trim() || 'hierarchy';
  downloadText(text, safeName + '.txt');
}

// A card's "state" is its "Stato" custom field value when the board has
// one (read live via t.board('customFields') + each card's
// customFieldItems — nothing hardcoded), falling back to the Trello list
// the card currently sits in for boards without a "Stato" field.
function cardState(card) {
  if (_state.statoField) {
    var items = card.customFieldItems || [];
    var item = items.find(function(ci) { return ci.idCustomField === _state.statoField.id; });
    if (item) {
      if (item.idValue) return _state.statoOptionMap[item.idValue] || '?';
      if (item.value) {
        if (item.value.text != null)    return item.value.text;
        if (item.value.number != null)  return String(item.value.number);
        if (item.value.checked != null) return item.value.checked ? 'Yes' : 'No';
        if (item.value.date != null)    return item.value.date;
      }
    }
    return 'No status';
  }
  return _state.listNameMap[card.idList] || '?';
}

// Every card visible in this list's tree: the roots plus all of their
// descendants, however deep, regardless of which list a descendant actually
// lives in (children can be cross-list, same as the tree view itself).
function collectTreeCards() {
  var result  = [];
  var visited = new Set();
  function walk(card) {
    if (visited.has(card.id)) return;
    visited.add(card.id);
    result.push(card);
    directChildren(card.id).forEach(walk);
  }
  listRoots().forEach(walk);
  return result;
}

// Report scoped to this list's tree (not the whole board): cards with a due
// date grouped by calendar day (earliest first), followed by cards with no
// due date grouped by their current list. Always uses the card's own name —
// a child is listed by its own name, never prefixed with its parent's.
function exportByDueDate() {
  var treeCards  = collectTreeCards();
  var withDue    = treeCards.filter(function(c) { return !!c.due; });
  var withoutDue = treeCards.filter(function(c) { return !c.due; });

  var dueGroups = {};
  withDue.forEach(function(c) {
    var d   = new Date(c.due);
    var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if (!dueGroups[key]) {
      dueGroups[key] = {
        sortKey: new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(),
        label:   d.getDate() + '/' + (d.getMonth() + 1) + '/' + d.getFullYear(),
        cards:   []
      };
    }
    dueGroups[key].cards.push(c);
  });

  var dueKeys = Object.keys(dueGroups).sort(function(a, b) {
    return dueGroups[a].sortKey - dueGroups[b].sortKey;
  });

  var lines = [];
  dueKeys.forEach(function(key) {
    var group = dueGroups[key];
    group.cards.sort(function(a, b) {
      return new Date(a.due) - new Date(b.due) || a.name.localeCompare(b.name);
    });
    lines.push(group.label);
    group.cards.forEach(function(c) { lines.push(c.name + ' (' + cardState(c) + ')'); });
    lines.push('');
  });

  // Group by state — ordered using the board's own Stato dropdown order
  // (or board list order, for boards without a Stato field) so the report
  // reads in the same order as the workflow itself.
  var stateGroups = {};
  var stateOrder  = [];
  if (_state.statoField) {
    (_state.statoField.options || []).forEach(function(o) {
      var text = (o.value && o.value.text) || '';
      if (text && !stateGroups[text]) { stateGroups[text] = []; stateOrder.push(text); }
    });
  } else {
    _state.lists.forEach(function(l) {
      if (!stateGroups[l.name]) { stateGroups[l.name] = []; stateOrder.push(l.name); }
    });
  }
  withoutDue.forEach(function(c) {
    var state = cardState(c);
    if (!stateGroups[state]) { stateGroups[state] = []; stateOrder.push(state); }
    stateGroups[state].push(c);
  });

  stateOrder.forEach(function(state) {
    var cards = stateGroups[state];
    if (!cards || cards.length === 0) return;
    cards.sort(function(a, b) { return a.name.localeCompare(b.name); });
    lines.push(state + ':');
    cards.forEach(function(c) { lines.push(c.name + ' (' + cardState(c) + ')'); });
    lines.push('');
  });

  while (lines.length && lines[lines.length - 1] === '') lines.pop();

  var today = new Date();
  var stamp = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  var safeName = (listName || 'hierarchy').replace(/[^a-z0-9\-_ ]/gi, '').trim() || 'hierarchy';
  downloadText(lines.join('\n') + '\n', safeName + '-by-due-date-' + stamp + '.txt');
}

// ── Load ───────────────────────────────────────────

Promise.all([
  t.cards('id', 'idShort', 'name', 'idList', 'shortLink', 'members', 'due', 'dueComplete', 'customFieldItems'),
  t.get('board', 'shared', 'relations'),
  t.get('board', 'shared', 'priorities'),
  t.get('board', 'shared', 'completions'),
  t.lists('id', 'name'),
  t.board('customFields')
]).then(function(res) {
  _state.allCards    = res[0];
  _state.relations   = res[1] || {};
  _state.priorities  = res[2] || {};
  _state.completions = res[3] || {};
  _state.lists       = res[4];
  var customFields   = res[5] || [];

  _state.cardMap = {};
  _state.allCards.forEach(function(c) { _state.cardMap[c.id] = c; });

  _state.listNameMap = {};
  _state.lists.forEach(function(l) { _state.listNameMap[l.id] = l.name; });

  _state.doneListIds = new Set(
    _state.lists.filter(function(l) { return DONE_PAT.test(l.name); }).map(function(l) { return l.id; })
  );

  // Locate the "Stato" dropdown field (if the board has one) and index its
  // options by id so cardState() can resolve a card's value to display text.
  // Wrapped defensively — an unexpected shape here should degrade to the
  // list-name fallback, not break the whole hierarchy view.
  _state.statoField    = null;
  _state.statoOptionMap = {};
  try {
    _state.statoField = customFields.find(function(f) {
      return (f.name || '').toLowerCase() === 'stato';
    }) || null;
    if (_state.statoField) {
      (_state.statoField.options || []).forEach(function(o) {
        _state.statoOptionMap[o.id] = (o.value && o.value.text) || '';
      });
    }
  } catch (e) {
    _state.statoField = null;
  }

  renderTree();
}).catch(function(err) {
  document.getElementById('app').innerHTML = '<p class="empty-hint" style="padding:8px">Error loading hierarchy: ' + (err && (err.message || err.toString())) + '</p>';
});

document.getElementById('search').addEventListener('input', renderTree);
document.getElementById('exportBtn').addEventListener('click', exportHierarchy);
document.getElementById('exportDueBtn').addEventListener('click', exportByDueDate);
</script>
</body>
</html>
