<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="app"><p class="loading">Loading…</p></div>

<script>
var t = TrelloPowerUp.iframe();

// Relationship data is stored entirely in one board-level key:
// board.shared.relations = {
//   [childCardId]: parentCardId,
//   ...
// }
// This lets any card read/write all relationships without needing OAuth.

function getRelations() {
  return t.get('board', 'shared', 'relations').then(function(r) { return r || {}; });
}

function setRelations(map) {
  return t.set('board', 'shared', 'relations', map);
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(currentCard, allCards, relations) {
  var cardMap = {};
  allCards.forEach(function(c) { cardMap[c.id] = c; });

  var parentId = relations[currentCard.id] || null;
  var parent = parentId ? cardMap[parentId] : null;

  var myChildren = Object.entries(relations)
    .filter(function(entry) { return entry[1] === currentCard.id; })
    .map(function(entry) { return cardMap[entry[0]]; })
    .filter(Boolean);

  var html = '';

  // Parent section
  html += '<div class="section">';
  html += '<div class="section-label">Parent Card</div>';
  if (parent) {
    html += '<span class="card-chip">';
    html += '<span class="chip-name">#' + parent.idShort + ' ' + escHtml(parent.name) + '</span>';
    html += '<button class="chip-remove" onclick="removeParent()" title="Remove parent">×</button>';
    html += '</span>';
  } else {
    html += '<span class="empty-state">None</span> ';
    html += '<button class="btn btn-ghost" onclick="pickParent()" style="margin-top:4px">Set parent</button>';
  }
  html += '</div>';

  // Children section
  html += '<div class="section">';
  html += '<div class="section-label">Child Cards (' + myChildren.length + ')</div>';
  if (myChildren.length > 0) {
    html += '<div class="children-list">';
    myChildren.forEach(function(child) {
      html += '<span class="card-chip">';
      html += '<span class="chip-name">#' + child.idShort + ' ' + escHtml(child.name) + '</span>';
      html += '<button class="chip-remove" onclick="removeChild(\'' + child.id + '\')" title="Remove child">×</button>';
      html += '</span>';
    });
    html += '</div>';
  } else {
    html += '<span class="empty-state">None</span>';
  }
  html += '<br><button class="btn btn-ghost" onclick="pickChild()" style="margin-top:6px">Add child card</button>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  t.sizeTo('#app').catch(function() {});

  // Cache state for picker callbacks
  window._state = { currentCard: currentCard, allCards: allCards, relations: relations };
}

function load() {
  Promise.all([
    t.card('id', 'idShort', 'name'),
    t.cards('id', 'name', 'idShort'),
    getRelations()
  ]).then(function(results) {
    render(results[0], results[1], results[2]);
  });
}

window.removeParent = function() {
  var s = window._state;
  getRelations().then(function(relations) {
    delete relations[s.currentCard.id];
    return setRelations(relations);
  }).then(load);
};

window.removeChild = function(childId) {
  getRelations().then(function(relations) {
    delete relations[childId];
    return setRelations(relations);
  }).then(load);
};

window.pickParent = function() {
  var s = window._state;
  // Exclude self, current children (would create cycle), and cards that are
  // already ancestors of this card.
  var childIds = new Set(
    Object.entries(s.relations)
      .filter(function(e) { return e[1] === s.currentCard.id; })
      .map(function(e) { return e[0]; })
  );

  // Walk up to find all ancestors to prevent cycles
  var ancestors = new Set();
  var cur = s.relations[s.currentCard.id];
  while (cur && !ancestors.has(cur)) {
    ancestors.add(cur);
    cur = s.relations[cur];
  }

  var candidates = s.allCards.filter(function(c) {
    return c.id !== s.currentCard.id &&
      !childIds.has(c.id) &&
      !ancestors.has(c.id);
  });

  openPicker('Set Parent Card', 'parent', candidates);
};

window.pickChild = function() {
  var s = window._state;
  var childIds = new Set(
    Object.entries(s.relations)
      .filter(function(e) { return e[1] === s.currentCard.id; })
      .map(function(e) { return e[0]; })
  );

  // Exclude self, existing children, and ancestors (prevent cycles)
  var ancestors = new Set();
  var cur = s.relations[s.currentCard.id];
  while (cur && !ancestors.has(cur)) {
    ancestors.add(cur);
    cur = s.relations[cur];
  }

  var candidates = s.allCards.filter(function(c) {
    return c.id !== s.currentCard.id &&
      !childIds.has(c.id) &&
      !ancestors.has(c.id) &&
      c.id !== s.currentCard.id;
  });

  openPicker('Add Child Card', 'child', candidates);
};

function openPicker(title, mode, candidates) {
  var s = window._state;
  t.popup({
    title: title,
    url: t.signUrl('./card-picker.html'),
    args: {
      mode: mode,
      currentCardId: s.currentCard.id,
      candidates: JSON.stringify(candidates.map(function(c) {
        return { id: c.id, name: c.name, idShort: c.idShort };
      }))
    },
    height: 400
  });
}

t.render(function() { load(); });
</script>
</body>
</html>
