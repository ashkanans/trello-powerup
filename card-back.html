<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="app"><p class="loading">Loading…</p></div>

<script>
// Detect Trello theme from URL hash context
try {
  var _ctx = JSON.parse(decodeURIComponent(window.location.hash.slice(1)));
  if (_ctx.context && _ctx.context.initialTheme === 'dark') {
    document.documentElement.classList.add('dark');
  }
} catch(e) {}

var t = TrelloPowerUp.iframe();

var DONE_PAT = /✅|done|completato|fatto|complete/i;

function getRelations() {
  return t.get('board', 'shared', 'relations').then(function(r) { return r || {}; });
}

function getCompletions() {
  return t.get('board', 'shared', 'completions').then(function(c) { return c || {}; });
}

function getOrigins() {
  return t.get('board', 'shared', 'origins').then(function(o) { return o || {}; });
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function render(currentCard, allCards, relations, completions, lists) {
  console.log('[PCR render] called for card=' + currentCard.id);
  console.log('[PCR render] lists:', lists.map(function(l) { return '"' + l.name + '" id=' + l.id; }));

  var cardMap = {};
  allCards.forEach(function(c) { cardMap[c.id] = c; });

  var doneLists = lists.filter(function(l) { return DONE_PAT.test(l.name); });
  var doneListIds = new Set(doneLists.map(function(l) { return l.id; }));
  var doneList = doneLists[0] || null;

  console.log('[PCR render] done lists matched by DONE_PAT:', doneLists.map(function(l) { return '"' + l.name + '"'; }));
  console.log('[PCR render] doneListId:', doneList ? doneList.id : 'NONE — no list matches DONE_PAT');

  function isDoneByList(id) {
    var card = cardMap[id];
    var result = !!(card && doneListIds.has(card.idList));
    return result;
  }
  function isDone(id) {
    return !!completions[id] || isDoneByList(id);
  }

  var parentId = relations[currentCard.id] || null;
  var parent = parentId ? cardMap[parentId] : null;

  var myChildren = Object.keys(relations)
    .filter(function(id) { return relations[id] === currentCard.id; })
    .map(function(id) { return cardMap[id]; })
    .filter(Boolean);

  console.log('[PCR render] children count:', myChildren.length);
  myChildren.forEach(function(child) {
    var card = cardMap[child.id];
    console.log('[PCR render]   child id=' + child.id + ' idList=' + (card ? card.idList : 'NOT IN MAP') + ' byList=' + isDoneByList(child.id) + ' byCompletion=' + !!completions[child.id] + ' isDone=' + isDone(child.id));
  });

  var html = '';

  // Parent row
  if (parent) {
    html += '<div class="parent-row">';
    html += '<span class="parent-icon">↑</span>';
    html += '<span class="parent-name">#' + parent.idShort + ' ' + escHtml(parent.name) + '</span>';
    html += '<button class="remove-btn" onclick="removeParent()">Remove</button>';
    html += '</div>';
  }

  // Subtasks section
  if (myChildren.length > 0) {
    var doneCount = myChildren.filter(function(c) { return isDone(c.id); }).length;
    var total = myChildren.length;
    var pct = Math.round((doneCount / total) * 100);
    console.log('[PCR render] progress: ' + doneCount + '/' + total + ' = ' + pct + '%');

    html += '<div class="progress-header">';
    html += '<span class="progress-text">' + pct + '% complete</span>';
    html += '</div>';

    html += '<div class="progress-track">';
    html += '<div class="progress-fill" style="width:' + pct + '%"></div>';
    html += '</div>';

    html += '<div class="checklist">';
    myChildren.forEach(function(child) {
      var checked = isDone(child.id);
      html += '<div class="checklist-item" onclick="toggleChild(\'' + child.id + '\')">';
      html += '<div class="checkbox' + (checked ? ' checked' : '') + '">';
      if (checked) {
        html += '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">';
        html += '<path d="M3 8l3.5 3.5L13 4.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
        html += '</svg>';
      }
      html += '</div>';
      html += '<span class="checklist-label' + (checked ? ' done' : '') + '">';
      html += '#' + child.idShort + ' ' + escHtml(child.name);
      html += '</span>';
      html += '<button class="remove-child-btn" onclick="event.stopPropagation();removeSubtask(\'' + child.id + '\')" title="Remove subtask">×</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
  t.sizeTo('#app').catch(function() {});

  window._state = {
    currentCard: currentCard,
    relations: relations,
    completions: completions,
    cardMap: cardMap,
    doneListIds: doneListIds,
    doneListId: doneList ? doneList.id : null
  };
}

function load() {
  console.log('[PCR load] fetching data at', new Date().toISOString());
  Promise.all([
    t.card('id', 'idShort', 'name'),
    t.cards('id', 'name', 'idShort', 'idList'),
    getRelations(),
    getCompletions(),
    t.lists('id', 'name')
  ]).then(function(results) {
    console.log('[PCR load] data received: card=' + results[0].id + ' allCards=' + results[1].length + ' lists=' + results[4].length);
    render(results[0], results[1], results[2], results[3], results[4]);
  }).catch(function(err) {
    console.error('[PCR load] ERROR:', err);
  });
}

function moveCard(childId, targetListId) {
  console.log('[PCR moveCard] moving card=' + childId + ' to list=' + targetListId);
  return t.getRestApi({ scope: 'write' }).then(function(api) {
    console.log('[PCR moveCard] REST API obtained, calling PUT');
    return api.put('/1/cards/' + childId, { idList: targetListId });
  }).then(function(result) {
    console.log('[PCR moveCard] PUT succeeded, result:', result);
    return result;
  });
}

window.toggleChild = function(childId) {
  var s = window._state;
  if (!s) { console.warn('[PCR toggleChild] _state is null, ignoring'); return; }

  var card = s.cardMap[childId];
  var byList = !!(card && s.doneListIds.has(card.idList));
  var byCompletion = !!s.completions[childId];
  var alreadyDone = byList || byCompletion;

  console.log('[PCR toggleChild] childId=' + childId + ' byList=' + byList + ' byCompletion=' + byCompletion + ' alreadyDone=' + alreadyDone + ' doneListId=' + s.doneListId);
  if (card) console.log('[PCR toggleChild] card.idList=' + card.idList);
  else console.warn('[PCR toggleChild] card NOT FOUND in cardMap');

  if (!alreadyDone) {
    var originListId = card && card.idList;
    console.log('[PCR toggleChild] marking DONE — originListId=' + originListId + ' doneListId=' + s.doneListId);
    if (s.doneListId) {
      getOrigins().then(function(origins) {
        if (originListId) origins[childId] = originListId;
        console.log('[PCR toggleChild] saving origin ' + originListId + ' for card ' + childId);
        return t.set('board', 'shared', 'origins', origins);
      }).then(function() {
        console.log('[PCR toggleChild] origin saved, calling moveCard');
        return moveCard(childId, s.doneListId);
      }).then(function() {
        console.log('[PCR toggleChild] moveCard done, reloading');
        load();
      }).catch(function(err) {
        console.error('[PCR toggleChild] moveCard FAILED:', err, '— falling back to completions');
        return getCompletions().then(function(c) {
          c[childId] = true;
          return t.set('board', 'shared', 'completions', c);
        }).then(load);
      });
    } else {
      console.log('[PCR toggleChild] no doneListId found — using completions fallback');
      getCompletions().then(function(c) {
        c[childId] = true;
        return t.set('board', 'shared', 'completions', c);
      }).then(load);
    }
  } else if (byList) {
    console.log('[PCR toggleChild] unmarking DONE (by list) — looking up origin');
    getOrigins().then(function(origins) {
      var originListId = origins[childId];
      console.log('[PCR toggleChild] origin for ' + childId + ':', originListId || 'NOT SAVED');
      if (!originListId) {
        console.warn('[PCR toggleChild] no origin saved, cannot move back');
        return load();
      }
      return moveCard(childId, originListId).then(function() {
        console.log('[PCR toggleChild] moved back to origin, clearing origin entry');
        delete origins[childId];
        return t.set('board', 'shared', 'origins', origins);
      }).then(load).catch(function(err) {
        console.error('[PCR toggleChild] move-back FAILED:', err);
      });
    });
  } else {
    console.log('[PCR toggleChild] unmarking DONE (by completion) — clearing completions');
    getCompletions().then(function(c) {
      delete c[childId];
      return t.set('board', 'shared', 'completions', c);
    }).then(load);
  }
};

window.removeParent = function() {
  var s = window._state;
  console.log('[PCR removeParent] called');
  getRelations().then(function(relations) {
    delete relations[s.currentCard.id];
    return t.set('board', 'shared', 'relations', relations);
  }).then(load);
};

window.removeSubtask = function(childId) {
  console.log('[PCR removeSubtask] called for childId=' + childId);
  getRelations().then(function(relations) {
    delete relations[childId];
    return t.set('board', 'shared', 'relations', relations);
  }).then(load);
};

t.render(function() {
  console.log('[PCR] t.render() triggered at', new Date().toISOString());
  load();
});
setInterval(function() {
  console.log('[PCR] setInterval tick at', new Date().toISOString());
  load();
}, 2000);
</script>
</body>
</html>
