<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="app"><p class="loading">Loading…</p></div>

<script>
try {
  var _ctx = JSON.parse(decodeURIComponent(window.location.hash.slice(1)));
  if (_ctx.context && _ctx.context.initialTheme === 'dark') {
    document.documentElement.classList.add('dark');
  }
} catch(e) {}

var t = TrelloPowerUp.iframe();

var DONE_PAT = /✅|done|completato|fatto|complete/i;

// Cached REST API handle — populated on first successful authorisation.
var _api = null;

function getRelations() {
  return t.get('board', 'shared', 'relations').then(function(r) { return r || {}; });
}

function getCompletions() {
  return t.get('board', 'shared', 'completions').then(function(c) { return c || {}; });
}

function getOrigins() {
  return t.get('board', 'shared', 'origins').then(function(o) { return o || {}; });
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Returns the write-scope REST API, triggering the OAuth popup if needed.
// Use only from explicit user actions (button clicks), not from polling.
function getWriteApi() {
  if (_api) return Promise.resolve(_api);
  return t.getRestApi({ scope: 'write' }).then(function(api) {
    _api = api;
    return api;
  });
}

// Returns the REST API only when a token is already stored (no popup).
// Returns null if the user has not yet authorised — callers must fall back gracefully.
function getStoredApi() {
  if (_api) return Promise.resolve(_api);
  return t.get('member', 'private', 'token').then(function(token) {
    if (!token) return null;
    return t.getRestApi({ scope: 'write' }).then(function(api) {
      _api = api;
      return api;
    }).catch(function() { return null; });
  }).catch(function() { return null; });
}

function render(currentCard, allCards, relations, completions, lists) {
  var cardMap = {};
  allCards.forEach(function(c) { cardMap[c.id] = c; });

  var doneLists = lists.filter(function(l) { return DONE_PAT.test(l.name); });
  var doneListIds = new Set(doneLists.map(function(l) { return l.id; }));

  // Prefer the list named exactly "Fatto"; fall back to the first matching done list.
  var doneList = doneLists.find(function(l) { return l.name.toLowerCase() === 'fatto'; })
    || doneLists[0]
    || null;

  console.log('[PCR render] card=' + currentCard.id + ' doneList=' + (doneList ? '"' + doneList.name + '"' : 'NONE') + ' doneLists=[' + doneLists.map(function(l) { return '"' + l.name + '"'; }).join(',') + ']');

  function isDoneByList(id) {
    var card = cardMap[id];
    return !!(card && doneListIds.has(card.idList));
  }
  function isDone(id) {
    return !!completions[id] || isDoneByList(id);
  }

  var parentId = relations[currentCard.id] || null;
  var parent = parentId ? cardMap[parentId] : null;

  var myChildren = Object.keys(relations)
    .filter(function(id) { return relations[id] === currentCard.id; })
    .map(function(id) { return cardMap[id]; })
    .filter(Boolean);

  var html = '';

  if (parent) {
    html += '<div class="parent-row">';
    html += '<span class="parent-icon">↑</span>';
    html += '<span class="parent-name">#' + parent.idShort + ' ' + escHtml(parent.name) + '</span>';
    html += '<button class="remove-btn" onclick="removeParent()">Remove</button>';
    html += '</div>';
  }

  if (myChildren.length > 0) {
    var doneCount = myChildren.filter(function(c) { return isDone(c.id); }).length;
    var total = myChildren.length;
    var pct = Math.round((doneCount / total) * 100);

    html += '<div class="progress-header">';
    html += '<span class="progress-text">' + pct + '% complete</span>';
    html += '</div>';

    html += '<div class="progress-track">';
    html += '<div class="progress-fill" style="width:' + pct + '%"></div>';
    html += '</div>';

    html += '<div class="checklist">';
    myChildren.forEach(function(child) {
      var checked = isDone(child.id);
      html += '<div class="checklist-item" onclick="toggleChild(\'' + child.id + '\')">';
      html += '<div class="checkbox' + (checked ? ' checked' : '') + '">';
      if (checked) {
        html += '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">';
        html += '<path d="M3 8l3.5 3.5L13 4.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
        html += '</svg>';
      }
      html += '</div>';
      html += '<span class="checklist-label' + (checked ? ' done' : '') + '">';
      html += '#' + child.idShort + ' ' + escHtml(child.name);
      html += '</span>';
      html += '<button class="remove-child-btn" onclick="event.stopPropagation();removeSubtask(\'' + child.id + '\')" title="Remove subtask">×</button>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('app').innerHTML = html;
  t.sizeTo('#app').catch(function() {});

  window._state = {
    currentCard: currentCard,
    relations: relations,
    completions: completions,
    cardMap: cardMap,
    doneListIds: doneListIds,
    doneListId: doneList ? doneList.id : null
  };
}

function load() {
  Promise.all([
    t.card('id', 'idShort', 'name'),
    t.board('id'),
    getRelations(),
    getCompletions(),
    t.lists('id', 'name'),
    getStoredApi()   // non-blocking: returns null if not yet authorised
  ]).then(function(results) {
    var currentCard = results[0];
    var boardId     = results[1].id;
    var relations   = results[2];
    var completions = results[3];
    var lists       = results[4];
    var api         = results[5];

    // Use the REST API when a token is available — it bypasses the SDK cache
    // and always returns the card's current idList. Fall back to t.cards() otherwise.
    var cardsPromise = api
      ? api.get('/1/boards/' + boardId + '/cards', { fields: 'id,idList,name,idShort' })
          .catch(function(err) {
            // Token may have expired — clear cache and fall back to SDK.
            console.warn('[PCR load] REST API cards failed, falling back to SDK:', err);
            if (err && (err.status === 401 || err.status === 403)) _api = null;
            return t.cards('id', 'name', 'idShort', 'idList');
          })
      : t.cards('id', 'name', 'idShort', 'idList');

    return cardsPromise.then(function(allCards) {
      console.log('[PCR load] card=' + currentCard.id + ' allCards=' + allCards.length + ' via=' + (api ? 'REST' : 'SDK'));
      render(currentCard, allCards, relations, completions, lists);
    });
  }).catch(function(err) {
    console.error('[PCR load] ERROR:', err);
  });
}

function moveCard(childId, targetListId) {
  console.log('[PCR moveCard] moving card=' + childId + ' → list=' + targetListId);
  return getWriteApi().then(function(api) {
    return api.put('/1/cards/' + childId, { idList: targetListId });
  });
}

function showError(msg) {
  var app = document.getElementById('app');
  var el = document.createElement('p');
  el.style.cssText = 'color:var(--remove-hover);font-size:12px;padding:0 0 6px';
  el.textContent = msg;
  app.insertBefore(el, app.firstChild);
  t.sizeTo('#app').catch(function() {});
  setTimeout(load, 3000);
}

window.toggleChild = function(childId) {
  var s = window._state;
  if (!s) { console.warn('[PCR toggleChild] _state is null'); return; }

  var card = s.cardMap[childId];
  var byList       = !!(card && s.doneListIds.has(card.idList));
  var byCompletion = !!s.completions[childId];
  var alreadyDone  = byList || byCompletion;

  console.log('[PCR toggleChild] childId=' + childId + ' byList=' + byList + ' byCompletion=' + byCompletion + ' alreadyDone=' + alreadyDone + ' doneListId=' + s.doneListId);

  if (!alreadyDone) {
    var originListId = card && card.idList;
    if (s.doneListId) {
      // Save origin so we can move the card back if unchecked later.
      getOrigins().then(function(origins) {
        if (originListId) origins[childId] = originListId;
        return t.set('board', 'shared', 'origins', origins);
      }).then(function() {
        return moveCard(childId, s.doneListId);
      }).then(function() {
        load();
      }).catch(function(err) {
        // getWriteApi() will have triggered the OAuth popup if needed.
        // If we still end up here the user declined or the API call failed —
        // show a message rather than silently pretending the card moved.
        console.error('[PCR toggleChild] moveCard FAILED:', err);
        showError('Could not move card. Please authorise the Power-Up when prompted and try again.');
      });
    } else {
      // No list matching DONE_PAT exists on this board — fall back to the
      // completions flag so the checkbox still works without a "done" list.
      console.log('[PCR toggleChild] no done list on board — using completions fallback');
      getCompletions().then(function(c) {
        c[childId] = true;
        return t.set('board', 'shared', 'completions', c);
      }).then(load);
    }
  } else if (byList) {
    // Card is done because it lives in a done list — move it back to its origin.
    getOrigins().then(function(origins) {
      var originListId = origins[childId];
      if (!originListId) {
        console.warn('[PCR toggleChild] no origin saved for ' + childId + ', cannot move back');
        return load();
      }
      return moveCard(childId, originListId).then(function() {
        delete origins[childId];
        return t.set('board', 'shared', 'origins', origins);
      }).then(load).catch(function(err) {
        console.error('[PCR toggleChild] move-back FAILED:', err);
        showError('Could not move card back. Please authorise the Power-Up when prompted and try again.');
      });
    });
  } else {
    // Done via completions flag only — just clear the flag.
    getCompletions().then(function(c) {
      delete c[childId];
      return t.set('board', 'shared', 'completions', c);
    }).then(load);
  }
};

window.removeParent = function() {
  var s = window._state;
  getRelations().then(function(relations) {
    delete relations[s.currentCard.id];
    return t.set('board', 'shared', 'relations', relations);
  }).then(load);
};

window.removeSubtask = function(childId) {
  getRelations().then(function(relations) {
    delete relations[childId];
    return t.set('board', 'shared', 'relations', relations);
  }).then(load);
};

t.render(function() {
  load();
});
setInterval(load, 2000);
</script>
</body>
</html>
