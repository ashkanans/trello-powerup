<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./config.js"></script>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<div class="picker-container">
  <input class="search-input" id="search" type="text" placeholder="Search or create card…" autofocus>
  <div class="picker-list" id="list"></div>
</div>

<script>
try {
  var _ctx = JSON.parse(decodeURIComponent(window.location.hash.slice(1)));
  if (_ctx.context && _ctx.context.initialTheme === 'dark') {
    document.documentElement.classList.add('dark');
  }
} catch(e) {}

var t = TrelloPowerUp.iframe({ appKey: TRELLO_APP_KEY, appName: 'Parent-Child Relations' });

var mode             = t.arg('mode')             || 'parent';
var currentCardId    = t.arg('currentCardId')    || '';
var currentListId    = t.arg('currentListId')    || '';
var currentSelectionId = t.arg('currentSelectionId') || '';
var currentChildIds  = new Set();
try { currentChildIds = new Set(JSON.parse(t.arg('currentChildIds') || '[]')); } catch(e) {}
var candidates = [];
try { candidates = JSON.parse(t.arg('candidates') || '[]'); } catch(e) {}

console.log('[PCR picker] init mode=' + mode + ' card=' + currentCardId + ' list=' + currentListId + ' candidates=' + candidates.length);

// ── REST API ──────────────────────────────────────────
// getToken() silently fails in all iframe contexts because browsers block
// window.open() called from inside a postMessage handler (not a real user
// gesture). Fix: show "Authorize Power-Up" inside this visible picker iframe
// and call window.open() directly from the button click — browsers allow it.
// auth-callback.html reads the token from the URL fragment and postMessages
// it back here, where we cache it and re-render.

var _restApi = null;
try { _restApi = t.getRestApi({ scope: 'write' }); } catch(e) {}

var _cachedToken = t.arg('oauthToken') || null;

// Try a token stored during a previous session
if (!_cachedToken && _restApi) {
  try {
    var _ls = _restApi.localStorage || window.localStorage;
    var _k  = _restApi.tokenStorageKey;
    if (_k) { var _st = _ls.getItem(_k); if (_st) _cachedToken = _st; }
  } catch(e) {}
}

// Token posted back by auth-callback.html after the Trello OAuth popup closes
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'trello_token' || !e.data.token) return;
  _cachedToken = e.data.token;
  if (_restApi) {
    try {
      var ls = _restApi.localStorage || window.localStorage;
      var k  = _restApi.tokenStorageKey;
      if (k) ls.setItem(k, _cachedToken);
    } catch(ex) {}
  }
  // Re-render: auth row disappears, create row appears
  var q = document.getElementById('search').value.toLowerCase();
  renderList(q ? candidates.filter(function(c) {
    return c.name.toLowerCase().includes(q) || String(c.idShort).includes(q);
  }) : candidates);
});

// Called from the "Authorize Power-Up" button click — real user gesture
window.openTrelloAuth = function() {
  var base = window.location.origin + window.location.pathname.replace(/[^\/]+$/, '');
  var callbackUrl = base + 'auth-callback.html';
  var key    = (_restApi && _restApi.appKey)     || TRELLO_APP_KEY;
  var name   = (_restApi && _restApi.appName)    || 'Parent-Child Relations';
  var origin = (_restApi && _restApi.authOrigin) || 'https://trello.com';
  var url = origin + '/1/authorize'
    + '?expiration=never'
    + '&name='          + encodeURIComponent(name)
    + '&scope=read%2Cwrite'
    + '&key='           + encodeURIComponent(key)
    + '&callback_method=postMessage'
    + '&return_url='    + encodeURIComponent(callbackUrl);
  window.open(url, 'trello_auth', 'width=600,height=700,resizable,scrollbars');
};

function getOAuthToken() {
  if (_cachedToken) return Promise.resolve(_cachedToken);
  return Promise.reject(new Error('auth_required'));
}

function trelloPost(path, params) {
  return getOAuthToken().then(function(token) {
    console.log('[PCR picker] POST', path, params);
    var url = 'https://api.trello.com' + path
      + '?key=' + encodeURIComponent(TRELLO_APP_KEY)
      + '&token=' + encodeURIComponent(token);
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params || {})
    }).then(function(res) {
      if (!res.ok) throw new Error('Trello API error: HTTP ' + res.status);
      return res.json();
    });
  });
}

// ── Helpers ───────────────────────────────────────────

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Render ────────────────────────────────────────────

function renderList(items) {
  var list = document.getElementById('list');
  var q    = document.getElementById('search').value.trim();
  var html = '';

  // "Create card" row — visible when the search box has text.
  // If no OAuth token yet, show an "Authorize Power-Up" row instead.
  if (q) {
    if (_cachedToken) {
      // encodeURIComponent so names with quotes/ampersands survive the onclick attr
      html += '<div class="picker-item picker-create" onclick="createAndLink(decodeURIComponent(\'' + encodeURIComponent(q) + '\'))">'
        + '<span class="create-icon">&#xFF0B;</span>'
        + '<span class="item-name"><span class="create-label">Create</span> &ldquo;' + escHtml(q) + '&rdquo;</span>'
        + '</div>';
    } else {
      html += '<div class="picker-item picker-create" onclick="openTrelloAuth()">'
        + '<span class="create-icon">&#x1F511;</span>'
        + '<span class="item-name"><span class="create-label">Authorize Power-Up</span> to create cards</span>'
        + '</div>';
    }
  }

  if (items.length === 0) {
    html += '<div class="picker-empty">' + (q ? 'No matching cards &mdash; create one above.' : 'No cards found.') + '</div>';
  } else if (mode === 'children') {
    html += items.map(function(card) {
      var isChild = currentChildIds.has(card.id);
      return '<div class="picker-item" onclick="toggleCard(\'' + card.id + '\')">'
        + '<div class="checkbox' + (isChild ? ' checked' : '') + '">'
        + (isChild
          ? '<svg viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
          : '')
        + '</div>'
        + '<span class="item-id">#' + card.idShort + '</span>'
        + '<span class="item-name' + (isChild ? ' item-selected' : '') + '">' + escHtml(card.name) + '</span>'
        + '</div>';
    }).join('');
  } else {
    html += items.map(function(card) {
      var isSel = card.id === currentSelectionId;
      return '<div class="picker-item' + (isSel ? ' picker-item-active' : '') + '" onclick="selectCard(\'' + card.id + '\')">'
        + '<span class="item-id">#' + card.idShort + '</span>'
        + '<span class="item-name">' + escHtml(card.name) + '</span>'
        + (isSel ? '<span class="item-check">&#x2713;</span>' : '')
        + '</div>';
    }).join('');
  }

  list.innerHTML = html;
}

// ── Actions ───────────────────────────────────────────

window.toggleCard = function(selectedCardId) {
  console.log('[PCR picker] toggleCard id=' + selectedCardId);
  t.get('board', 'shared', 'relations').then(function(relations) {
    var map = relations || {};
    if (currentChildIds.has(selectedCardId)) {
      delete map[selectedCardId];
      currentChildIds.delete(selectedCardId);
      console.log('[PCR picker] toggleCard: removed child=' + selectedCardId);
    } else {
      map[selectedCardId] = currentCardId;
      currentChildIds.add(selectedCardId);
      console.log('[PCR picker] toggleCard: added child=' + selectedCardId + ' → parent=' + currentCardId);
    }
    return t.set('board', 'shared', 'relations', map);
  }).then(function() {
    console.log('[PCR picker] toggleCard: relations saved');
    var q = document.getElementById('search').value.toLowerCase();
    var filtered = q ? candidates.filter(function(c) {
      return c.name.toLowerCase().includes(q) || String(c.idShort).includes(q);
    }) : candidates;
    renderList(filtered);
  });
};

window.selectCard = function(selectedCardId) {
  console.log('[PCR picker] selectCard id=' + selectedCardId);
  t.get('board', 'shared', 'relations').then(function(relations) {
    var map = relations || {};
    if (selectedCardId === currentSelectionId) {
      delete map[currentCardId];
      currentSelectionId = '';
      console.log('[PCR picker] selectCard: cleared parent for card=' + currentCardId);
    } else {
      map[currentCardId] = selectedCardId;
      currentSelectionId = selectedCardId;
      console.log('[PCR picker] selectCard: set parent=' + selectedCardId + ' for card=' + currentCardId);
    }
    return t.set('board', 'shared', 'relations', map);
  }).then(function() {
    console.log('[PCR picker] selectCard: relations saved, closing popup');
    t.closePopup();
  });
};

window.createAndLink = function(name) {
  name = (name || '').trim();
  if (!name) return;

  console.log('[PCR createAndLink] START name="' + name + '" listId=' + currentListId + ' mode=' + mode);

  if (!currentListId) {
    console.error('[PCR createAndLink] ERROR: currentListId is empty — cannot create card');
    return;
  }

  // Dim the create row while the request is in flight to prevent double-click
  var createEl = document.querySelector('.picker-create');
  if (createEl) {
    createEl.style.opacity = '0.5';
    createEl.style.pointerEvents = 'none';
  }

  console.log('[PCR createAndLink] POSTing new card: name="' + name + '" idList=' + currentListId);
  trelloPost('/1/cards', { name: name, idList: currentListId }).then(function(newCard) {
    console.log('[PCR createAndLink] Card created: id=' + newCard.id + ' #' + newCard.idShort + ' name="' + newCard.name + '"');
    if (mode === 'parent') {
      // selectCard saves the relation and closes the popup
      selectCard(newCard.id);
    } else {
      // Add to local candidates so the item appears checked in the list
      candidates.push({ id: newCard.id, name: newCard.name, idShort: newCard.idShort });
      // Clear the search box, then link (toggle) the new card
      document.getElementById('search').value = '';
      toggleCard(newCard.id);
    }
  }).catch(function(err) {
    console.error('[PCR createAndLink] ERROR:', err);
    // Re-enable the create row
    if (createEl) {
      createEl.style.opacity = '1';
      createEl.style.pointerEvents = '';
    }
    // Show a brief error message
    var errEl = document.createElement('p');
    errEl.style.cssText = 'color:var(--remove-hover);font-size:11px;padding:4px 8px;margin:0';
    errEl.textContent = 'Could not create card. Authorise the Power-Up when prompted and try again.';
    var list = document.getElementById('list');
    list.insertBefore(errEl, list.firstChild);
    setTimeout(function() { if (errEl.parentNode) errEl.parentNode.removeChild(errEl); }, 4000);
  });
};

// ── Search ────────────────────────────────────────────

document.getElementById('search').addEventListener('input', function(e) {
  var q = e.target.value.toLowerCase();
  var filtered = q ? candidates.filter(function(c) {
    return c.name.toLowerCase().includes(q) || String(c.idShort).includes(q);
  }) : candidates;
  renderList(filtered);
});

renderList(candidates);
t.sizeTo('.picker-container').catch(function() {});
</script>
</body>
</html>
