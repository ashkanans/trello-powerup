<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='20' font-size='20'>🔗</text></svg>">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// When opened directly in a browser (not inside Trello's iframe), show a
// friendly message instead of letting the SDK throw postMessage errors.
if (window.self === window.top) {
  document.body.style.cssText = 'font-family:sans-serif;padding:40px;color:#172b4d';
  document.body.innerHTML = '<h2>Parent-Child Relations</h2><p style="margin-top:8px;color:#5e6c84">This is a Trello Power-Up connector. It only works when loaded inside Trello.</p>';
} else {

var POWERUP_ICON = 'https://ashkanans.github.io/trello-powerup/icon.svg';
var DONE_PAT = /✅|done|completato|fatto|complete/i;

function getAncestors(cardId, relations) {
  var ancestors = new Set();
  var cur = relations[cardId];
  while (cur && !ancestors.has(cur)) {
    ancestors.add(cur);
    cur = relations[cur];
  }
  return ancestors;
}

function getDescendants(cardId, relations) {
  var descendants = new Set();
  var queue = [cardId];
  while (queue.length > 0) {
    var current = queue.shift();
    Object.keys(relations).forEach(function(childId) {
      if (relations[childId] === current && !descendants.has(childId)) {
        descendants.add(childId);
        queue.push(childId);
      }
    });
  }
  return descendants;
}

function buildBadges(cardId, relations, completions, lists, allCards) {
  var doneListIds = new Set(
    lists.filter(function(l) { return DONE_PAT.test(l.name); }).map(function(l) { return l.id; })
  );
  console.log('[PCR badges] lists fetched:', lists.map(function(l) { return l.name + '=' + l.id; }));
  console.log('[PCR badges] done list IDs:', Array.from(doneListIds));

  var cardListMap = {};
  allCards.forEach(function(c) { cardListMap[c.id] = c.idList; });

  function isDone(id) {
    var byCompletion = !!completions[id];
    var byList = doneListIds.has(cardListMap[id]);
    return byCompletion || byList;
  }

  var badges = [];

  var parentId = relations[cardId];
  if (parentId) {
    badges.push({ icon: POWERUP_ICON, text: '↑ subtask', color: 'blue' });
  }

  var children = Object.keys(relations).filter(function(id) { return relations[id] === cardId; });
  console.log('[PCR badges] cardId=' + cardId + ' children:', children);

  if (children.length > 0) {
    children.forEach(function(id) {
      console.log('[PCR badges]   child ' + id + ' idList=' + cardListMap[id] + ' byCompletion=' + !!completions[id] + ' byList=' + doneListIds.has(cardListMap[id]) + ' isDone=' + isDone(id));
    });
    var done = children.filter(isDone).length;
    var total = children.length;
    var pct = Math.round((done / total) * 100);
    console.log('[PCR badges] progress: ' + done + '/' + total + ' = ' + pct + '%');
    badges.push({
      text: pct + '% (' + done + '/' + total + ')',
      color: pct === 100 ? 'green' : (pct === 0 ? 'red' : 'orange'),
      icon: POWERUP_ICON,
      refresh: 10
    });
  }

  return badges;
}

TrelloPowerUp.initialize({

  'card-buttons': function(t, options) {
    console.log('[PCR] card-buttons capability called');
    var buttons = [
      {
        icon: POWERUP_ICON,
        text: 'Add Parent',
        callback: function(t) {
          console.log('[PCR] Add Parent button clicked');
          return Promise.all([
            t.card('id'),
            t.cards('id', 'name', 'idShort'),
            t.get('board', 'shared', 'relations')
          ]).then(function(results) {
            console.log('[PCR] Add Parent data loaded', results[0]);
            var cardId = results[0].id;
            var allCards = results[1];
            var relations = results[2] || {};
            var parentId = relations[cardId] || '';
            var descendants = getDescendants(cardId, relations);

            var candidates = allCards.filter(function(c) {
              return c.id !== cardId && !descendants.has(c.id);
            });
            console.log('[PCR] Add Parent candidates:', candidates.length);

            return t.popup({
              title: 'Set Parent Card',
              url: './card-picker.html',
              args: {
                mode: 'parent',
                currentCardId: cardId,
                currentSelectionId: parentId,
                candidates: JSON.stringify(candidates.map(function(c) {
                  return { id: c.id, name: c.name, idShort: c.idShort };
                }))
              },
              height: 400
            });
          }).catch(function(err) {
            console.error('[PCR] Add Parent error:', err);
          });
        }
      },
      {
        icon: POWERUP_ICON,
        text: 'Add SubTasks',
        callback: function(t) {
          console.log('[PCR] Add SubTasks button clicked');
          return Promise.all([
            t.card('id'),
            t.cards('id', 'name', 'idShort'),
            t.get('board', 'shared', 'relations')
          ]).then(function(results) {
            console.log('[PCR] Add SubTasks data loaded', results[0]);
            var cardId = results[0].id;
            var allCards = results[1];
            var relations = results[2] || {};

            var currentChildIds = Object.keys(relations).filter(function(k) {
              return relations[k] === cardId;
            });

            var ancestors = getAncestors(cardId, relations);
            var candidates = allCards.filter(function(c) {
              return c.id !== cardId && !ancestors.has(c.id);
            });
            console.log('[PCR] Add SubTasks candidates:', candidates.length);

            return t.popup({
              title: 'Add SubTasks',
              url: './card-picker.html',
              args: {
                mode: 'children',
                currentCardId: cardId,
                currentChildIds: JSON.stringify(currentChildIds),
                candidates: JSON.stringify(candidates.map(function(c) {
                  return { id: c.id, name: c.name, idShort: c.idShort };
                }))
              },
              height: 420
            });
          }).catch(function(err) {
            console.error('[PCR] Add SubTasks error:', err);
          });
        }
      }
    ];
    console.log('[PCR] card-buttons returning', buttons.length, 'buttons:', buttons.map(function(b){ return b.text; }));
    return buttons;
  },

  'card-badges': function(t, options) {
    console.log('[PCR card-badges] called at', new Date().toISOString());
    return Promise.all([
      t.card('id'),
      t.get('board', 'shared', 'relations'),
      t.get('board', 'shared', 'completions'),
      t.lists('id', 'name'),
      t.cards('id', 'idList')
    ]).then(function(results) {
      var cardId = results[0].id;
      var relations = results[1] || {};
      var completions = results[2] || {};
      var lists = results[3] || [];
      var allCards = results[4] || [];
      console.log('[PCR card-badges] data loaded for cardId=' + cardId + ' lists=' + lists.length + ' cards=' + allCards.length);
      var badges = buildBadges(cardId, relations, completions, lists, allCards);
      console.log('[PCR card-badges] returning badges:', badges.map(function(b){ return b.text; }));
      return badges;
    }).catch(function(err) {
      console.error('[PCR card-badges] ERROR:', err);
      return [];
    });
  },

  'card-detail-badges': function(t, options) {
    console.log('[PCR card-detail-badges] called at', new Date().toISOString());
    return Promise.all([
      t.card('id'),
      t.get('board', 'shared', 'relations'),
      t.get('board', 'shared', 'completions'),
      t.lists('id', 'name'),
      t.cards('id', 'idList')
    ]).then(function(results) {
      var cardId = results[0].id;
      var relations = results[1] || {};
      var completions = results[2] || {};
      var lists = results[3] || [];
      var allCards = results[4] || [];
      console.log('[PCR card-detail-badges] data loaded for cardId=' + cardId + ' lists=' + lists.length + ' cards=' + allCards.length);
      var badges = buildBadges(cardId, relations, completions, lists, allCards);
      console.log('[PCR card-detail-badges] returning badges:', badges.map(function(b){ return b.text; }));
      return badges;
    }).catch(function(err) {
      console.error('[PCR card-detail-badges] ERROR:', err);
      return [];
    });
  },

  'card-back-section': function(t, options) {
    return Promise.all([
      t.card('id'),
      t.get('board', 'shared', 'relations')
    ]).then(function(results) {
      var cardId = results[0].id;
      var relations = results[1] || {};
      var hasParent = !!relations[cardId];
      var hasChildren = Object.keys(relations).some(function(id) {
        return relations[id] === cardId;
      });
      if (!hasParent && !hasChildren) {
        return null;
      }
      return {
        title: 'SubTasks',
        icon: POWERUP_ICON,
        content: {
          type: 'iframe',
          url: t.signUrl('./card-back.html'),
          height: 80
        }
      };
    });
  }

});

} // end iframe-only guard
</script>
</body>
</html>
